name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Build & Test API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: logistics_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "Host=localhost;Database=logistics_ai_test;Username=postgres;Password=postgres"
      GROQ_API_KEY: "ci-placeholder-key"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore LogisticsAI.Api/LogisticsAI.Api.csproj

      - name: Build
        run: dotnet build LogisticsAI.Api/LogisticsAI.Api.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        continue-on-error: true

  ui:
    name: Build UI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: logistics-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: logistics-ui

      - name: Type check & build
        run: npm run build
        working-directory: logistics-ui
